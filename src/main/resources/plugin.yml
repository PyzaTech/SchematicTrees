name: SchematicTrees
main: com.pyzatech.schematictrees.SchematicTreesPlugin
version: ${project.version}
api-version: "1.13"
authors: [ PyzaTech ]
website: https://PyzaTech.com
description: Replaces sapling tree growth with configurable WorldEdit schematics (random pool per TreeType and random yaw).
softdepend: [ WorldEdit, FastAsyncWorldEdit ]

commands:
  schematictrees:
    description: SchematicTrees admin commands
    usage: /<command> help
    aliases: [ st, schtrees ]

permissions:
  schematictrees.admin:
    description: Setup and manage schematic trees
    default: op
